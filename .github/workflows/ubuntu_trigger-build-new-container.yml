name: Ubuntu - Trigger build new container

on:
  workflow_call:
    inputs:
      registry:
        required: true
        type: string
      registry_account:
        required: true
        type: string
      registry_repo:
        required: true
        type: string      
      registry_repo_tag_cache_name:
        required: true
        type: string      
      registry_platforms:
        required: true
        type: string
      release_name:
        required: true
        type: string
      release_tag:
        required: true
        type: string
      release_no:
        required: true
        type: string
      readme_file:
        required: true
        type: string       
      gh_pr_labels:
        required: true
        type: string


jobs:
  Create-NewBranch:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Generate app token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: generate-token
        with:
          client-id: ${{ secrets.GH_APP_RIHC_ID }}
          private-key: ${{ secrets.GH_APP_RIHC_PRIVATE_KEY }}
    
      - name: Create a new branch
        uses: peterjgrainger/action-create-branch@4b81ce657e255acd677cc6c55c9c763654be3aef # v4.0.0
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
        with:
          branch: releases/${{ inputs.release_tag }}

          
  Create-ContainerImage:
    runs-on: ubuntu-latest
    needs: Create-NewBranch
    
    permissions:
      contents: write
      pull-requests: read

    steps:       
      - name: Generate app token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: generate-token
        with:
          client-id: ${{ secrets.GH_APP_RIHC_ID }}
          private-key: ${{ secrets.GH_APP_RIHC_PRIVATE_KEY }}

      - name: Checkout new created branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: releases/${{ inputs.release_tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create tag list for docker image
        id: tags
        run: |

          # basename does remove the directory prefix of a path
          # https://stackoverflow.com/questions/3294072/get-last-dirname-filename-in-a-file-path-argument-in-bash
          container_tag=$(basename ${{ github.ref_name }})
          echo $container_tag

          #
          echo "docker=${{ inputs.registry_account }}/${{ inputs.registry_repo }}:latest, ${{ inputs.REGISTRY_ACCOUNT }}/${{ inputs.registry_repo }}:${{ inputs.release_no }}" >> $GITHUB_OUTPUT

#      - name: Build and push
#        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
#        with:
#          context: ./images/ubuntu-slim/
#          file: ./images/ubuntu-slim/Dockerfile
#          push: true
#          build-args: |
#            IMAGE_VERSION=${{ inputs.release_no }}
#            IMAGE_OWNER=${{ github.repository_owner }}
#          tags: ${{ steps.tags.outputs.docker }}
#          platforms: ${{ inputs.registry_platforms }}
#          cache-from: type=registry,ref=${{ inputs.registry_account }}/${{ inputs.registry_repo }}:${{ inputs.registry_repo_tag_cache_name }}
#          cache-to: type=registry,ref=${{ inputs.registry_account }}/${{ inputs.registry_repo }}:${{ inputs.registry_repo_tag_cache_name }},mode=max

      - name: Generating software report
        shell: bash
        run: |
          # docker image pull "${{ inputs.registry_account }}/${{ inputs.registry_repo }}:${{ inputs.release_no }}"
          docker image pull "wydler/test5:20260530.0008.1"
          
          chmod +x ./images/ubuntu-slim/generate-software-report.sh
          #./images/ubuntu-slim/generate-software-report.sh "${{ inputs.registry_account }}/${{ inputs.registry_repo }}:${{ inputs.release_no }}"
          ./images/ubuntu-slim/generate-software-report.sh "wydler/test5:20260530.0008.1"

      - name: Commit & Push changes
        uses: actions-js/push@5a7cbd780d82c0c937b5977586e641b2fd94acc5 # v1.5
        with:
          branch: releases/${{ inputs.release_tag }}
          github_token: ${{ steps.generate-token.outputs.token }}
          force: true
