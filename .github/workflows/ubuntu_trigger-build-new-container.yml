---
name: Ubuntu - Trigger build new container

"on":
  workflow_call:
    inputs:
      registry:
        required: true
        type: string
      registry_account:
        required: true
        type: string
      registry_repo:
        required: true
        type: string
      registry_repo_tag_cache_name:
        required: true
        type: string
      registry_platforms:
        required: true
        type: string
      release_name:
        required: true
        type: string
      release_tag:
        required: true
        type: string
      release_no:
        required: true
        type: string
      readme_file:
        required: true
        type: string
      gh_pr_labels:
        required: true
        type: string
      workingdir:
        required: false
        type: string
        default: "images/ubuntu-slim"
      SWRP_FILE_NAME:
        required: false
        type: string
        default: "ubuntu-slim-Report.json"
      SWRP_PREVIOUS_FILE_NAME:
        required: false
        type: string
        default: "software-report.previous.json"


jobs:
  Create-NewBranch:
    runs-on: ubuntu-slim

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Generate app token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        id: generate-token
        with:
          client-id: ${{ secrets.GH_APP_RIHC_ID }}
          private-key: ${{ secrets.GH_APP_RIHC_PRIVATE_KEY }}

      - name: Create a new branch
        uses: peterjgrainger/action-create-branch@4b81ce657e255acd677cc6c55c9c763654be3aef  # v4.0.0
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
        with:
          branch: releases/${{ inputs.release_tag }}


  Create-ContainerImage:
    runs-on: ubuntu-latest
    needs: Create-NewBranch

    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Generate app token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        id: generate-token
        with:
          client-id: ${{ secrets.GH_APP_RIHC_ID }}
          private-key: ${{ secrets.GH_APP_RIHC_PRIVATE_KEY }}

      - name: Checkout new created branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: releases/${{ inputs.release_tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: ./${{ inputs.workingdir }}/
          file: ./${{ inputs.workingdir }}/Dockerfile
          push: true
          load: true
          build-args: |
            IMAGE_VERSION=${{ inputs.release_no }}
            IMAGE_OWNER=${{ github.repository_owner }}
          tags: ${{ inputs.registry_account }}/${{ inputs.registry_repo }}:${{ inputs.release_no }}
          platforms: ${{ inputs.registry_platforms }}
          cache-from: type=registry,ref=${{ inputs.registry_account }}/${{ inputs.registry_repo }}:${{ inputs.registry_repo_tag_cache_name }}
          cache-to: type=registry,ref=${{ inputs.registry_account }}/${{ inputs.registry_repo }}:${{ inputs.registry_repo_tag_cache_name }},mode=max

      - name: Test the new image
        shell: bash
        working-directory: ${{ inputs.workingdir }}
        run: |
          # Execute the container validation tests
          bash test.sh "$docker_tag"
        env:
          docker_tag: "${{ inputs.registry_account }}/${{ inputs.registry_repo }}:${{ inputs.release_no }}"

      - name: Generating software report
        shell: bash
        run: |
          # Change to the image-specific working directory that contains the report generation scripts
          cd ./${{ inputs.workingdir }}/

          # Generate a software inventory report for the newly built container image.
          # The report is later used for release notes and change tracking between image versions.
          bash generate-software-report.sh "$docker_tag"
        env:
          docker_tag: "${{ inputs.registry_account }}/${{ inputs.registry_repo }}:${{ inputs.release_no }}"

      - name: Upload file ${{ inputs.SWRP_FILE_NAME }} to artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ inputs.SWRP_FILE_NAME }}
          path: ./${{ inputs.workingdir }}/${{ inputs.SWRP_FILE_NAME }}
          if-no-files-found: error
          overwrite: true
          retention-days: 1

      - name: Remove ${{ inputs.SWRP_FILE_NAME }}
        run: |
          rm ./${{ inputs.workingdir }}/${{ inputs.SWRP_FILE_NAME }}

      - name: Commit & Push changes
        uses: actions-js/push@5a7cbd780d82c0c937b5977586e641b2fd94acc5  # v1.5
        with:
          branch: releases/${{ inputs.release_tag }}
          github_token: ${{ steps.generate-token.outputs.token }}
          force: true


  Create-Report:
    runs-on: ubuntu-slim

    needs:
      - Create-ContainerImage

    permissions:
      contents: read

    outputs:
      FileContent: ${{ steps.readme.outputs.FileContent }}

    steps:
      - name: Generate app token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        id: generate-token
        with:
          client-id: ${{ secrets.GH_APP_RIHC_ID }}
          private-key: ${{ secrets.GH_APP_RIHC_PRIVATE_KEY }}

      - name: Checkout new created branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: '0'
          ref: releases/${{ inputs.release_tag }}

      - name: Get previous Release Tag
        id: get-previous-release
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"

          Write-Host "Finding previous release for OS '$($env:ReleaseTag.Split("/")[0])'..."

          $PREVIOUS_RELEASE = (
            gh release list `
              --repo $env:GITHUB_REPOSITORY `
              --limit 25 `
              --json tagName `
              --jq ".[] | select(.tagName | startswith(`"$($env:ReleaseTag.Split("/")[0])/`")) | .tagName" |
            Select-Object -First 1
          ).Trim()

          "tag=$PREVIOUS_RELEASE" >> $env:GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          ReleaseTag: ${{ inputs.release_tag }}

      - name: Download file software-report.json from artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ${{ inputs.SWRP_FILE_NAME }}

      - name: Download previous ${{ inputs.SWRP_FILE_NAME }}
        if: steps.get-previous-release.outputs.tag != ''
        id: dl-json-file
        shell: pwsh
        run: |
          Write-Host "Downloading previous software report..."
          $downloadUrl = "https://github.com/$($env:GITHUB_REPOSITORY)/releases/download/$env:PREVIOUS_RELEASE/${{ inputs.SWRP_FILE_NAME }}"
          Write-Host $downloadUrl

          Invoke-WebRequest `
            -Uri $downloadUrl `
            -OutFile $env:SoftwareReportPreviousFile
        env:
          PREVIOUS_RELEASE: ${{ steps.get-previous-release.outputs.tag }}
          SoftwareReportPreviousFile: "${{ runner.temp }}/${{ inputs.SWRP_PREVIOUS_FILE_NAME }}"

      - name: Generate previous ${{ inputs.SWRP_FILE_NAME }}
        if: steps.get-previous-release.outputs.tag == ''
        shell: pwsh
        run: |
          $data = @{
            NodeType = "HeaderNode"
            Title    = "Ubuntu"
            Children = @()
          }

          $data |
            ConvertTo-Json -Depth 10 |
            Set-Content "$env:SoftwareReportPreviousFile" -Encoding utf8

          cat "$env:SoftwareReportPreviousFile"
        env:
          SoftwareReportPreviousFile: "${{ runner.temp }}/${{ inputs.SWRP_PREVIOUS_FILE_NAME }}"

      - name: Generate software report differences
        id: software-report-diff
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host "Calculating image differences..."

          helpers/software-report-base/Calculate-ImagesDifference.ps1 `
            $env:SoftwareReportPreviousFile `
            $env:SoftwareReportCurrentFile `
            $env:ImagesDifferenceFile `
            $env:ReleaseTag `
            $env:ReadmeFile

          Write-Host "Done"
        env:
          SoftwareReportPreviousFile: "${{ runner.temp }}/${{ inputs.SWRP_PREVIOUS_FILE_NAME }}"
          SoftwareReportCurrentFile: "${{ inputs.SWRP_FILE_NAME }}"
          ImagesDifferenceFile: "${{ runner.temp }}/ImagesDifference.md"
          ReleaseTag: ${{ inputs.release_tag }}
          ReadmeFile: ./${{ inputs.workingdir }}/${{ inputs.readme_file }}

      - name: Save file 'ImagesDifference.md' in variable
        id: readme
        run: |
          {
            echo 'FileContent<<EOF'
            cat $ImagesDifferenceFile
            echo 'EOF'
          } >> $GITHUB_OUTPUT
        env:
          ImagesDifferenceFile: "${{ runner.temp }}/ImagesDifference.md"

      - name: Use output
        run: |
          echo "${{ steps.readme.outputs.FileContent }}"

      - name: Remove ${{ inputs.SWRP_FILE_NAME }}
        run: |
          rm ${{ inputs.SWRP_FILE_NAME }}


  Create-PullRequest:
    runs-on: ubuntu-slim

    needs:
      - Create-Report

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Generate app token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        id: generate-token
        with:
          client-id: ${{ secrets.GH_APP_RIHC_ID }}
          private-key: ${{ secrets.GH_APP_RIHC_PRIVATE_KEY }}

      - name: Checkout new created branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: '0'
          ref: releases/${{ inputs.release_tag }}

      - name: Create pull request
        id: pullrequest
        uses: devops-infra/action-pull-request@86d8692dc48a93ee5731b366f78f658eb7243a8d  # v1.1.3
        with:
          github_token: ${{ steps.generate-token.outputs.token }}
          source_branch: releases/${{ inputs.release_tag }}
          target_branch: customize
          title: ${{ inputs.release_name }}
          body: ${{ needs.Create-Report.outputs.FileContent }}
          label: ${{ inputs.gh_pr_labels }}
          assignee: dwydler

      - name: Merge the pull request
        uses: pascalgn/automerge-action@7961b8b5eec56cc088c140b56d864285eabd3f67  # v0.16.4
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          PULL_REQUEST: ${{ steps.pullrequest.outputs.pr_number }}
          MERGE_LABELS: ${{ inputs.release_tag }}
          UPDATE_LABELS: ${{ inputs.release_tag }}
          MERGE_COMMIT_MESSAGE: "${{ inputs.release_name }} (#${{ steps.pullrequest.outputs.pr_number }})"
          MERGE_METHOD: "squash"
          MERGE_RETRIES: 10
          MERGE_RETRY_SLEEP: 30000  # milliseconds
          MERGE_READY_STATE: clean


  Create-Release:
    runs-on: ubuntu-slim

    needs:
      - Create-Report
      - Create-PullRequest

    permissions:
      contents: write

    steps:
      - name: Generate app token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        id: generate-token
        with:
          client-id: ${{ secrets.GH_APP_RIHC_ID }}
          private-key: ${{ secrets.GH_APP_RIHC_PRIVATE_KEY }}

      - name: Download file ${{ inputs.SWRP_FILE_NAME }} from artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ${{ inputs.SWRP_FILE_NAME }}

      - name: Create a new release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd  # v1.21.0
        with:
          tag: ${{ inputs.release_tag }}
          name: ${{ inputs.release_name }}
          body: ${{ needs.Create-Report.outputs.FileContent }}
          token: ${{ steps.generate-token.outputs.token }}
          artifacts: |
            ${{ inputs.SWRP_FILE_NAME }}

      - name: Delete all artifacts associated with the run
        uses: geekyeggo/delete-artifact@176a747ab7e287e3ff4787bf8a148716375ca118  # v6.0.0
        with:
          name: |
            ${{ inputs.SWRP_FILE_NAME }}


  Publish-ContainerImage:
    runs-on: ubuntu-slim

    needs:
      - Create-Release

    permissions:
      contents: read

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Promote image to latest
        shell: bash
        run: |
          # Create or update the "latest" tag to point to the newly released image version.
          # This operation updates the manifest in the registry and preserves all platform variants.
          docker buildx imagetools create \
            -t ${{ inputs.registry_account }}/${{ inputs.registry_repo }}:latest \
            ${{ inputs.registry_account }}/${{ inputs.registry_repo }}:${{ inputs.release_no }}
