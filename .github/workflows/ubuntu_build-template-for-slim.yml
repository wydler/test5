---
name: Ubuntu - Build docker image for Ubuntu Slim

"on":
  workflow_dispatch:

permissions:
  contents: read

env:
  os: "ubuntu-slim"

  REGISTRY: ${{ vars.REGISTRY }}
  REGISTRY_ACCOUNT: ${{ vars.REGISTRY_ACCOUNT }}
  REGISTRY_REPO: ${{ vars.REGISTRY_REPO }}
  REGISTRY_REPO_TAG_CACHE_NAME: ${{ vars.REGISTRY_REPO_TAG_CACHE_NAME }}
  REGISTRY_PLATFORMS: ${{ vars.REGISTRY_PLATFORMS }}

concurrency:
  group: "runner-image-build-${{ github.workflow }}"
  cancel-in-progress: false

jobs:
  Check-Requirements:
    runs-on: ubuntu-slim

    steps:
      - name: Check required variables
        shell: bash
        run: |
          missing=0
  
          for var in \
            REGISTRY \
            REGISTRY_ACCOUNT \
            REGISTRY_REPO2 \
            REGISTRY_REPO_TAG_CACHE_NAME \
            REGISTRY_PLATFORMS2
          do
            if [[ -z "${!var}" ]]; then
              echo "::error::Repository variable '$var' is missing"
              missing=1
            fi
          done
  
          exit $missing


  Set-Variables:
    runs-on: ubuntu-slim
    
    needs:
      - Check-Requirements

    permissions:
      contents: read

    steps:
      - name: Assign ENV variable to workflow variable
        id: env
        run: |
           echo "os=$os" >> $GITHUB_OUTPUT

    outputs:
      os: ${{ steps.env.outputs.os }}


  Trigger-CollectInformations:
    needs: Set-Variables

    permissions:
      contents: read
      pull-requests: read

    uses: ./.github/workflows/ubutnu_trigger-collect-informations.yml
    with:
      os: ${{ needs.Set-Variables.outputs.os }}


  Trigger-ImageBuilder:
    needs:
      - Set-Variables
      - Trigger-CollectInformations

    permissions:
      contents: write
      pull-requests: write

    uses: ./.github/workflows/ubuntu_trigger-build-new-container.yml
    with:
      release_name: ${{ needs.Trigger-CollectInformations.outputs.ReleaseName }}
      release_tag: ${{ needs.Trigger-CollectInformations.outputs.ReleaseTag }}
      release_no: ${{ needs.Trigger-CollectInformations.outputs.ReleaseNo }}
      readme_file: ${{ needs.Trigger-CollectInformations.outputs.ReadmeFile }}
      gh_pr_labels: ${{ needs.Trigger-CollectInformations.outputs.GitHubPrLabels }}

      registry: ${{ vars.REGISTRY }}
      registry_account: ${{ vars.REGISTRY_ACCOUNT }}
      registry_repo: ${{ vars.REGISTRY_REPO }}
      registry_repo_tag_cache_name: ${{ vars.REGISTRY_REPO_TAG_CACHE_NAME }}
      registry_platforms: ${{ vars.REGISTRY_PLATFORMS }}
    secrets: inherit


  Trigger-CleanupOnFailure:
    if: ${{ failure() || cancelled() }}

    needs:
      - Set-Variables
      - Trigger-CollectInformations
      - Trigger-ImageBuilder

    permissions:
      contents: write

    uses: ./.github/workflows/ubuntu_trigger-cleanup-on-failure.yml
    with:
      ReleaseTag: ${{ needs.Trigger-CollectInformations.outputs.ReleaseTag }}
      release_no: ${{ needs.Trigger-CollectInformations.outputs.ReleaseNo }}
      HCloudObjectName: ${{ needs.Trigger-CollectInformations.outputs.HCloudObjectName  }}

      registry_account: ${{ vars.REGISTRY_ACCOUNT }}
      registry_repo: ${{ vars.REGISTRY_REPO }}
    secrets: inherit
