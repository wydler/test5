---
name: Ubuntu - Trigger cleanup on failure

"on":
  workflow_call:
    inputs:
      ReleaseTag:
        required: true
        type: string
      HCloudObjectName:
        required: true
        type: string
      registry_account:
        required: true
        type: string
      registry_repo:
        required: true
        type: string
      release_no:
        required: true
        type: string


permissions:
  contents: read


jobs:
  Delete-NewBranch:
    runs-on: ubuntu-slim

    steps:
      - name: Generate app token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        id: generate-token
        with:
          client-id: ${{ secrets.GH_APP_RIHC_ID }}
          private-key: ${{ secrets.GH_APP_RIHC_PRIVATE_KEY }}

      - name: Delete previously created branch
        uses: dawidd6/action-delete-branch@d1efac9a6f7a9b408d4e8ff663a99c1fbac17b3f  # v3.1.0
        with:
          github_token: ${{ steps.generate-token.outputs.token }}
          branches: releases/${{ inputs.ReleaseTag }}


  Delete-HetznerRessources:
    runs-on: ubuntu-slim

    steps:
      - name: Install Hetzner Cloud Cli
        uses: hetznercloud/setup-hcloud@ac9e7d74fb41a3ca44a6a3da123bd5aa70731e3a  # v2.0.0

      - name: Delete temporary SSH Key on Hetzner Cloud
        run: |
          sshkey_id=$(hcloud ssh-key list --output "columns=ID" --output "noheader" -l "server=$HCLOUD_NAME")

          if [ ! -z "$sshkey_id" ]; then
            hcloud ssh-key delete $sshkey_id
            echo "The ssh key was succcessfully deleted."
          fi
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          HCLOUD_NAME: ${{ inputs.HCloudObjectName }}

      - name: Delete Server on Hetzner Cloud
        run: |
          server_id=$(hcloud server list --output "columns=ID" --output "noheader" -l "server=$HCLOUD_NAME")

          if [ ! -z "$server_id" ]; then
            hcloud server delete $server_id
            echo "The server was succcessfully deleted."
          else
            echo "No server found with the given label."
          fi
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          HCLOUD_NAME: ${{ inputs.HCloudObjectName }}

      - name: Delete Snapshot on Hetzner Cloud
        run: |
          snapshot_id=$(hcloud image list --output "columns=ID" --output "noheader" --type "snapshot" -l "server=$HCLOUD_NAME")

          if [ ! -z "$snapshot_id" ]; then
            hcloud image delete $snapshot_id
            echo "The snapshot was succcessfully deleted."
          else
            echo "No snapshot found with the given label."
          fi
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          HCLOUD_NAME: ${{ inputs.HCloudObjectName }}


  Delete-ContainerTag:
    runs-on: ubuntu-slim

    steps:
      - name: Delete Docker Hub tag
        run: |
          set -euo pipefail

          echo "=== Docker Hub Tag Deletion ==="
          echo "Repository : ${ACCOUNT}/${REPOSITORY}"
          echo "Tag        : ${TAG}"
          echo

          # Authenticate against Docker Hub and retrieve a JWT token
          echo "Requesting Docker Hub authentication token..."
          TOKEN=$(curl -s -X POST https://hub.docker.com/v2/users/login/ \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"$DOCKERHUB_USERNAME\",\"password\":\"$DOCKERHUB_TOKEN\"}" \
            | jq -r .token)

          # Verify that a token was returned
          if [ -z "${TOKEN}" ] || [ "${TOKEN}" = "null" ]; then
            echo "ERROR: Failed to obtain Docker Hub authentication token."
            exit 1
          else
            echo "Authentication successful."
            echo
          fi

          # Check whether the tag exists before attempting deletion
          echo "Checking whether tag '${TAG}' exists..."

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: JWT ${TOKEN}" \
            "https://hub.docker.com/v2/repositories/${ACCOUNT}/${REPOSITORY}/tags/${TAG}/")

          if [ "${HTTP_CODE}" = "404" ]; then
            echo "Tag '${TAG}' does not exist. Nothing to delete."
            exit 0
          elif [ "${HTTP_CODE}" != "200" ]; then
            echo "ERROR: Failed to query tag. HTTP status: ${HTTP_CODE}"
            exit 1
          else
            echo "Tag found. Deleting..."
          fi

          DELETE_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X DELETE \
            -H "Authorization: JWT ${TOKEN}" \
            "https://hub.docker.com/v2/repositories/${ACCOUNT}/${REPOSITORY}/tags/${TAG}/")

          if [ "${DELETE_CODE}" = "204" ]; then
            echo "SUCCESS: Tag '${TAG}' deleted."
          else
            echo "ERROR: Failed to delete tag. HTTP status: ${DELETE_CODE}"
            exit 1
          fi
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          ACCOUNT: ${{ inputs.registry_account }}
          REPOSITORY: ${{ inputs.registry_repo }}
          TAG: ${{ inputs.release_no }}
